<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Controlled Synthesizer</title>
    <!-- p5.js for drawing and camera access -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <!-- ml5.js for hand tracking -->
    <script src="https://unpkg.com/ml5@0.7.1/dist/ml5.min.js"></script>
    <!-- Tone.js for audio synthesis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            text-align: center;
        }
        canvas {
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #controls {
            margin-top: 20px;
        }
        button {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1ED760;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #status {
            margin-bottom: 15px;
            font-size: 1.1em;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div id="status">Loading Model...</div>
    <div id="main-content"></div>
    <div id="controls">
        <button id="startButton" disabled>Start Audio</button>
    </div>

<script>
    // This script uses p5.js instance mode to keep variables out of the global scope.
    const sketch = (p) => {
        let video;
        let handpose;
        let predictions = [];
        let synth;
        let gain;
        let audioStarted = false;

        const startButton = document.getElementById('startButton');
        const statusEl = document.getElementById('status');

        p.setup = () => {
            const canvas = p.createCanvas(640, 480);
            canvas.parent('main-content'); // Attach canvas to the div
            video = p.createCapture(p.VIDEO);
            video.size(p.width, p.height);

            // Initialize ml5.js Handpose model
            handpose = ml5.handpose(video, modelReady);

            // Listen for hand predictions
            handpose.on("predict", results => {
                predictions = results;
                if (audioStarted) {
                    controlSynth();
                }
            });

            // Hide the original video element and only show the p5 canvas
            video.hide();

            // Setup Tone.js synthesizer
            // Create a gain node to control volume
            gain = new Tone.Gain(0).toDestination();
            // Create a synth and connect it to the gain node
            synth = new Tone.FMSynth({
                harmonicity: 3,
                modulationIndex: 10,
                envelope: {
                    attack: 0.01,
                    decay: 0.2,
                    sustain: 0.5,
                    release: 0.1,
                },
            }).connect(gain);

            startButton.onclick = async () => {
                await Tone.start();
                audioStarted = true;
                startButton.disabled = true;
                startButton.innerText = "Audio Active";
                statusEl.innerText = "Move your hand to control the sound.";
                // Start the synth silently, ready to be modulated
                synth.triggerAttack("C4");
            };
        };

        function modelReady() {
            statusEl.innerText = "Model loaded. Click 'Start Audio' to begin.";
            startButton.disabled = false;
            console.log("Handpose Model Ready!");
        }

        p.draw = () => {
            // Flip the video horizontally for a mirror effect
            p.translate(p.width, 0);
            p.scale(-1, 1);
            p.image(video, 0, 0, p.width, p.height);

            // Draw the detected hand landmarks
            drawHand();
        };

        function drawHand() {
            for (let i = 0; i < predictions.length; i += 1) {
                const prediction = predictions[i];
                for (let j = 0; j < prediction.landmarks.length; j += 1) {
                    const keypoint = prediction.landmarks[j];
                    p.fill(0, 255, 0);
                    p.noStroke();
                    p.ellipse(keypoint[0], keypoint[1], 10, 10);
                }
            }
        }

        function controlSynth() {
            if (predictions.length > 0) {
                // Use the first detected hand
                const hand = predictions[0];
                const thumbTip = hand.landmarks[4]; // Thumb tip
                const indexTip = hand.landmarks[8]; // Index finger tip

                // --- Control Frequency (Pitch) with Y-axis ---
                // Map the index finger's Y position to a frequency range (e.g., C2 to C6)
                // Lower on screen = lower frequency
                const freq = p.map(indexTip[1], p.height, 0, 100, 800);
                synth.frequency.rampTo(freq, 0.1);

                // --- Control Volume with finger distance ---
                // Calculate distance between thumb and index finger
                const distance = p.dist(thumbTip[0], thumbTip[1], indexTip[0], indexTip[1]);
                // Map the distance to a gain value (0 to 0.5)
                const volume = p.map(distance, 20, 200, 0, 0.5, true); // `true` constrains the value
                gain.gain.rampTo(volume, 0.1);

            } else {
                // If no hand is detected, fade out the volume
                gain.gain.rampTo(0, 0.2);
            }
        }
    };

    // Create a new p5 instance
    new p5(sketch);
</script>

</body>
</html>
